name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # This tells the action to save the individual 
          # platform builds so they can be combined later.
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package Geode Mod
    runs-on: ubuntu-latest
    needs: build
    # Runs even if one platform fails, so you can still get the others.
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Combine Builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # This is the name of the folder you will download 
          # from the GitHub Actions "Summary" page.
          name: geode-release
          path: ${{ steps.build.outputs.build-output }}
