name: Build Geode Mod
on:
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Windows, os: windows-latest, target: "" }
          - { name: macOS,   os: macos-latest,   target: "" }
          - { name: iOS,     os: macos-latest,   target: "iOS" }
          - { name: Android32, os: ubuntu-latest, target: "Android32" }
          - { name: Android64, os: ubuntu-latest, target: "Android64" }

    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # STEP 1: Manually set up the Geode CLI and SDK
      - name: Setup Geode
        uses: geode-sdk/setup-geode@v2
        with:
          sdk: latest

      # Build the mod using the CLI
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@v2
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Combine
        uses: geode-sdk/build-geode-mod/combine@v2
        id: build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: geode-release
          path: ${{ steps.build.outputs.build-output }}
