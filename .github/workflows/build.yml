name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
          - name: macOS
          - name: Android32
          - name: Android64

    name: Build ${{ matrix.config.name }}
    # We use the official Geode action which handles the OS selection automatically
    runs-on: ${{ (matrix.config.name == 'macOS' && 'macos-latest') || (matrix.config.name == 'Windows' && 'windows-latest') || 'ubuntu-latest' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # This saves the build for the "package" step below
          combine: true
          # Maps our matrix name to the Geode target name
          target: ${{ (matrix.config.name == 'Android32' && 'Android32') || (matrix.config.name == 'Android64' && 'Android64') || '' }}

  package:
    name: Package Geode Mod
    runs-on: ubuntu-latest
    needs: build
    # Runs even if one platform fails so you still get the ones that worked
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Combine Builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # This is the name of the download link on the Summary page
          name: geode-release
          path: ${{ steps.build.outputs.build-output }}
